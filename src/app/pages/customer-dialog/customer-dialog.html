<div class="modal">

    <div class="dialog">

        <div class="header">
               <h2>Add Customer</h2>
        </div>

        <form #customerForm="ngForm" (ngSubmit)="saveCustomer()">

            <div class="grid">

                <div class="form-group">
    <label>Customer Number</label>

    <input
        type="text"
        name="customerNumber"
        placeholder="CUS1001"
        [(ngModel)]="customer.customerNumber"
        [readonly]="mode === 'view'"
        required>
</div>

                <div class="form-group">

    <label>First Name</label>

    <input
        type="text"
        name="firstName"
        placeholder="John"
        [(ngModel)]="customer.firstName"
        [readonly]="mode === 'view'"
        required>

</div>

               <div class="form-group">

    <label>Last Name</label>

    <input
        type="text"
        name="lastName"
        placeholder="Doe"
        [(ngModel)]="customer.lastName"
        [readonly]="mode === 'view'"
        required>

</div>

                <div class="form-group">

    <label>Email</label>

    <input
        type="email"
        name="email"
        placeholder="john.doe@gmail.com"
        [(ngModel)]="customer.email"
        [readonly]="mode === 'view'"
        required>

</div>

                <div class="form-group">

    <label>Phone</label>

    <input
        type="tel"
        name="phone"
        maxlength="10"
        placeholder="9876543210"
        [(ngModel)]="customer.phone"
        [readonly]="mode === 'view'"
        required>

</div>

                <div class="form-group">

    <label>Date of Birth</label>

    <input
        type="date"
        name="dateOfBirth"
        [(ngModel)]="customer.dateOfBirth"
        [disabled]="mode === 'view'"
        required>

</div>

            </div>

            <div class="form-group full-width">

    <label>Address</label>

    <textarea
        name="address"
        rows="4"
        placeholder="Kolkata, India"
        [(ngModel)]="customer.address"
        [readonly]="mode === 'view'"
        required>
    </textarea>

</div>

            <div class="footer">

                <button type="button" class="cancel-btn" (click)="onClose()">
                    Cancel
                </button>

                <button type="submit" class="save-btn" [disabled]="customerForm.invalid">
                    Save Customer
                </button>

            </div>

        </form>

    </div>

</div>
